<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="'Arial Black', Arial, sans-serif">

  <!-- ── CROWN ICON MARK ── -->
  <rect x="270" y="18" width="140" height="120" rx="16" fill="#0A2E6E"/>

  <!-- Crown base bar -->
  <rect x="291" y="104" width="98" height="12" rx="4" fill="#FF6F00"/>

  <!-- Crown body fill -->
  <polygon points="291,104 291,72 318,88 340,52 362,88 389,72 389,104" fill="#0D47A1"/>

  <!-- Crown outline / teeth -->
  <polyline points="291,104 291,72 318,88 340,52 362,88 389,72 389,104" fill="none" stroke="#FFB74D" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Crown jewels -->
  <circle cx="318" cy="96" r="5" fill="#FF6F00"/>
  <circle cx="340" cy="96" r="7" fill="#FFB74D"/>
  <circle cx="362" cy="96" r="5" fill="#FF6F00"/>

  <!-- Center jewel highlight -->
  <circle cx="340" cy="96" r="3" fill="#FFFFFF" opacity="0.5"/>

  <!-- Stars above crown tips -->
  <text x="310" y="70" font-size="9" fill="#FFB74D" opacity="0.9" font-family="Arial" text-anchor="middle">★</text>
  <text x="340" y="50" font-size="9" fill="#FFB74D" opacity="0.9" font-family="Arial" text-anchor="middle">★</text>
  <text x="370" y="70" font-size="9" fill="#FFB74D" opacity="0.9" font-family="Arial" text-anchor="middle">★</text>

  <!-- ── WORDMARK ── -->
  <!-- "P2P" -->
  <text x="340" y="180" text-anchor="middle" font-size="58" font-weight="900" fill="#0A2E6E" font-family="'Arial Black', Arial, sans-serif" letter-spacing="4">P2P</text>

  <!-- Orange accent rule -->
  <rect x="160" y="186" width="360" height="3.5" rx="1.5" fill="#FF6F00"/>

  <!-- "EBOOK EMPIRE" -->
  <text x="340" y="234" text-anchor="middle" font-size="36" font-weight="900" fill="#FF6F00" font-family="'Arial Black', Arial, sans-serif" letter-spacing="3">EBOOK EMPIRE</text>

  <!-- Tagline with flanking rules and dots -->
  <circle cx="88" cy="264" r="2.5" fill="#FF6F00" opacity="0.6"/>
  <line x1="95" y1="264" x2="202" y2="264" stroke="#FFB74D" stroke-width="1" opacity="0.6"/>
  <text x="340" y="268" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0D47A1" font-family="Arial, sans-serif" letter-spacing="2.5">AMERICA'S BRIDGE FOR PEOPLE 2 PROSPERITY</text>
  <line x1="478" y1="264" x2="585" y2="264" stroke="#FFB74D" stroke-width="1" opacity="0.6"/>
  <circle cx="592" cy="264" r="2.5" fill="#FF6F00" opacity="0.6"/>

</svg>
